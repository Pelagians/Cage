schemaVersion: cage.app/v0
name: vscode-choco-vnc
version: "0.1.0"

runtime:
  provider: wine
  version: latest
  network: bridge

launch:
  entrypoint: /opt/wine/bin/winevnc.sh
  args:
    - "C:/Program Files/Microsoft VS Code/Code.exe"
  env:
    VNC_GEOMETRY: "1920x1080"
    WINEDEBUG: "-all"

modules:
  - type: chocolatey
    packages:
      - visualstudio.code
