schemaVersion: cage.app/v0
name: powershell-wrapper-pwsh-vnc
version: "0.1.0"

runtime:
  provider: wine
  version: latest
  network: bridge

sources:
  - id: powershell-wrapper-for-wine
    type: other
    url: https://codeberg.org/Synchro/powershell-wrapper-for-wine
    policy: redistributable
    description: Open-source PowerShell wrapper for Wine; Cage installs pinned release assets into Wine's powershell.exe shim.

# PowerShell Core provides pwsh.exe. The wrapper replaces Wine's legacy
# powershell.exe path and forwards legacy powershell.exe invocations into pwsh.exe.
modules:
  - type: powershell-wrapper
    version: "7"
    wrapperVersion: v4.2.0

compatibility:
  arch: win64
  windowsVersion: win10
  graphics:
    backend: wined3d
  env:
    WINEDEBUG: "-all"

# Launch through Wine's visible console host by default. VNC needs a windowed
# process to remain alive; a bare console process exits immediately under the
# non-interactive container runner. wineconsole then starts the wrapper, which
# forwards legacy powershell.exe semantics to PowerShell Core.
launch:
  entrypoint: C:/windows/system32/wineconsole.exe
  args:
    - "C:/windows/system32/WindowsPowerShell/v1.0/powershell.exe"
    - -NoLogo
    - -NoExit
  env:
    NO_COLOR: "1"
    POWERSHELL_UPDATECHECK: "Off"
    chocolateyVersion: "1.4.0"
    VNC_GEOMETRY: "1920x1080"
  workingDirectory: C:/users/cage

entrypoints:
  - id: console
    name: Visible wineconsole running the powershell.exe wrapper
    executable: C:/windows/system32/wineconsole.exe
    args:
      - "C:/windows/system32/WindowsPowerShell/v1.0/powershell.exe"
      - -NoLogo
      - -NoExit
    env:
      NO_COLOR: "1"
      POWERSHELL_UPDATECHECK: Off
      chocolateyVersion: "1.4.0"
    workingDirectory: C:/users/cage
  - id: powershell-wrapper
    name: Headless powershell.exe wrapper forwarding to pwsh
    executable: C:/windows/system32/WindowsPowerShell/v1.0/powershell.exe
    args:
      - -NoLogo
      - -NoExit
    env:
      NO_COLOR: "1"
      POWERSHELL_UPDATECHECK: Off
      chocolateyVersion: "1.4.0"
    workingDirectory: C:/users/cage
  - id: pwsh
    name: Headless PowerShell Core direct launch
    executable: C:/Program Files/PowerShell/7/pwsh.exe
    args:
      - -NoLogo
      - -NoExit
    env:
      NO_COLOR: "1"
      POWERSHELL_UPDATECHECK: Off
      chocolateyVersion: "1.4.0"
    workingDirectory: C:/users/cage

state:
  persistence: persistent

exports:
  - name: powershell-profile
    path: C:/Program Files/PowerShell/7/profile.ps1

provenance:
  sources:
    - uri: https://codeberg.org/Synchro/powershell-wrapper-for-wine/releases/download/v4.2.0
      note: The powershell-wrapper module downloads pinned release assets during the install phase.
