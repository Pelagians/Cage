schemaVersion: cage.app/v0
name: notepad-plus-plus
version: "8.6.0"

runtime:
  provider: wine
  version: latest

modules:
  - type: exe
    source: https://example.invalid/notepad-plus-plus.exe
    sha256: unverified-example-placeholder
    silentArgs: /S
    config: overlays/notepad-plus-plus/config.xml
  - type: winetricks
    verbs: [corefonts, vcrun2022]

launch:
  entrypoint: C:/Program Files/Notepad++/notepad++.exe
  workingDirectory: C:/Program Files/Notepad++

state:
  persistence: persistent
