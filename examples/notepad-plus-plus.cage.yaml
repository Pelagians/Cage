schemaVersion: cage.app/v0
name: notepad-plus-plus
version: "8.6.0"

runtime:
  provider: wine
  version: "11.0"
  network: none

build:
  network: host

modules:
  - type: chocolatey
    install:
      packages:
        - notepadplusplus

launch:
  entrypoint: C:/Program Files/Notepad++/notepad++.exe
  workingDirectory: C:/Program Files/Notepad++
