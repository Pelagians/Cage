name: Apply PS5.1 Native MSCoree

on:
  push:
    branches: [agent/synchro-cfw-layering]
    paths:
      - '.github/workflows/apply-ps51-native-mscoree.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synchro-cfw-layering
          fetch-depth: 0

      - name: Patch PS5.1 loader policy
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply-ps51-native-mscoree.py
          bash -n core/chocolatey/assets/install-powershell51.sh
          git diff --check

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add core/chocolatey/assets/install-powershell51.sh
          git commit -m 'fix: load native .NET CLR for Windows PowerShell 5.1'
          git push origin HEAD:agent/synchro-cfw-layering
