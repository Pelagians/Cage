name: CFW Archive Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/cfw-archive-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect WMF manifest identities
        shell: bash
        run: |
          set -euo pipefail
          root=/tmp/wmf51
          mkdir -p "$root/zip" "$root/msu" "$root/cab"
          curl -fsSL --retry 3 \
            -o "$root/wmf51.zip" \
            https://download.microsoft.com/download/6/F/5/6F5FF66C-6775-42B0-86C4-47D41F2DA187/Win7AndW2K8R2-KB3191566-x64.zip
          7z x -y "$root/wmf51.zip" -o"$root/zip" >/dev/null
          msu="$(find "$root/zip" -iname 'Win7AndW2K8R2-KB3191566-x64.msu' -type f -print -quit)"
          7z x -y "$msu" -o"$root/msu" >/dev/null
          cab="$(find "$root/msu" -iname 'Windows6.1-KB3191566-x64.cab' -type f -print -quit)"
          7z x -y "$cab" -o"$root/cab" >/dev/null
          python3 - "$root/cab" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path(sys.argv[1])
          selected = [
              'msil_system.management.automation_31bf3856ad364e35_7.3.7601.16384_none_85266a48f56bfafc.manifest',
              'msil_microsoft.powershell.consolehost_31bf3856ad364e35_7.3.7601.16384_none_8634e813855724c9.manifest',
              'amd64_microsoft-windows-powershell-exe_31bf3856ad364e35_7.3.7601.16384_none_48be7e79e188387e.manifest',
              'wow64_microsoft-windows-powershell-exe_31bf3856ad364e35_7.3.7601.16384_none_531328cc15e8fa79.manifest',
          ]
          def local(tag):
              return tag.rsplit('}', 1)[-1]
          for name in selected:
              path = root / name
              tree = ET.parse(path)
              identity = next(e for e in tree.iter() if local(e.tag) == 'assemblyIdentity')
              print(f'=== {name} ===')
              print('identity', dict(sorted(identity.attrib.items())))
              for element in tree.iter():
                  if local(element.tag) == 'file' and element.attrib.get('name'):
                      print('file', dict(sorted(element.attrib.items())))
                      for child in element:
                          if local(child.tag) == 'link':
                              print('link', dict(sorted(child.attrib.items())))
          PY
