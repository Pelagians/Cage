name: CFW Archive Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/cfw-archive-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print CFW PS5.1 implementation
        shell: bash
        run: |
          set -euo pipefail
          root=/tmp/cfw-inspect
          mkdir -p "$root"
          curl -fsSL --retry 3 \
            -o "$root/winetricks.ps1" \
            https://raw.githubusercontent.com/noahgiroux/Chocolatey-for-wine/9d635ecdba9b10103c202fea51dbaba70aec4d83/winetricks.ps1
          sha256sum "$root/winetricks.ps1"
          python3 - "$root/winetricks.ps1" <<'PY'
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          lines = path.read_text(encoding="utf-8-sig").splitlines()
          targets = ("func_ps51", "func_ps51_ise")
          for target in targets:
              start = next(
                  (index for index, line in enumerate(lines)
                   if re.match(rf"\s*function\s+{re.escape(target)}\b", line, re.I)),
                  None,
              )
              print(f"=== {target} ===")
              if start is None:
                  print("NOT FOUND")
                  continue
              end = len(lines)
              for index in range(start + 1, len(lines)):
                  if re.match(r"\s*function\s+func_[A-Za-z0-9_]+\b", lines[index], re.I):
                      end = index
                      break
              for index in range(start, end):
                  print(f"{index + 1:04d}: {lines[index]}")
          print("=== ALL PS51 REFERENCES ===")
          for index, line in enumerate(lines, start=1):
              if "ps51" in line.lower():
                  print(f"{index:04d}: {line}")
          PY
