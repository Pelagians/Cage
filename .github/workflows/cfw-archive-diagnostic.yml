name: CFW Archive Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/cfw-archive-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract CFW manifest installer
        shell: bash
        run: |
          set -euo pipefail
          root=/tmp/cfw-inspect
          mkdir -p "$root"
          curl -fsSL --retry 3 \
            -o "$root/winetricks.ps1" \
            https://raw.githubusercontent.com/noahgiroux/Chocolatey-for-wine/9d635ecdba9b10103c202fea51dbaba70aec4d83/winetricks.ps1
          python3 - "$root/winetricks.ps1" <<'PY'
          import re
          import sys
          from pathlib import Path

          lines = Path(sys.argv[1]).read_text(encoding="utf-8-sig").splitlines()
          for target in ("install_from_manifest", "func_expand"):
              start = next(
                  index for index, line in enumerate(lines)
                  if re.match(rf"\s*function\s+{re.escape(target)}\b", line, re.I)
              )
              depth = 0
              seen_open = False
              end = len(lines)
              for index in range(start, len(lines)):
                  stripped = re.sub(r"<#[\s\S]*?#>", "", lines[index])
                  depth += stripped.count("{")
                  if stripped.count("{"):
                      seen_open = True
                  depth -= stripped.count("}")
                  if seen_open and depth <= 0 and index > start:
                      end = index + 1
                      break
              print(f"=== {target} {start + 1}-{end} ===")
              for index in range(start, end):
                  print(f"{index + 1:04d}: {lines[index]}")
          PY
