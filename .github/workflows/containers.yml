# workflow to build and push Cage runtime container images to ghcr.io
name: Build Cage Runtime Containers

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - 'runtime/catalog.json'
      - 'runtime/catalog.py'
      - 'runtime/providers.py'
      - 'container/manager.py'
      - '.github/workflows/containers.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/pelagians

jobs:
  catalog:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.catalog.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate build matrix from runtime catalog
        id: catalog
        run: |
          MATRIX="$(python3 -m runtime.catalog --ci-matrix)"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Runtime catalog matrix:"
          echo "${MATRIX}" | python3 -m json.tool

  build:
    runs-on: ubuntu-latest
    needs: catalog
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.catalog.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.provider }}:${{ matrix.version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.published_ref }}
            ${{ matrix.published_alias_refs }}
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.tag }}
          build-args: |
            ${{ matrix.build_arg }}

      - name: Observe deprecated PowerShell runtime smoke on wine 11.0
        if: matrix.provider == 'wine' && matrix.version == '11.0'
        shell: bash
        run: |
          set +e
          LOG=/tmp/cage-powershell-runtime-smoke.log
          docker run --rm --pull always --shm-size 2g \
            -e CAGE_GITHUB_ANNOTATIONS=1 \
            -e CAGE_GITHUB_ANNOTATION_LEVEL=warning \
            "${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.tag }}" \
            cage-powershell-runtime-smoke 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            summary="$(grep -E '^\[cage-pwsh-smoke\]|^\[cage-pwsh-(direct|cmd|reg|msi|wineboot|winecfg|process|prefix)|^::(error|warning)' "$LOG" | tail -80 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -80 "$LOG" || true)"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::warning title=Deprecated PowerShell smoke failed::exit=$rc%0A${summary}"
          else
            echo "::notice title=Deprecated PowerShell smoke passed::provider=${{ matrix.provider }} version=${{ matrix.version }}"
          fi
          exit 0

      - name: Compare PowerShell runtime smoke on candidate Wine images
        if: (matrix.provider == 'wine' && matrix.version == '10.0') || (matrix.provider == 'staging' && (matrix.version == '11.0' || matrix.version == '11.10'))
        shell: bash
        run: |
          set +e
          LOG="/tmp/cage-powershell-runtime-smoke-${{ matrix.provider }}-${{ matrix.version }}.log"
          docker run --rm --pull always --shm-size 2g \
            -e CAGE_GITHUB_ANNOTATIONS=1 \
            -e CAGE_GITHUB_ANNOTATION_LEVEL=warning \
            "${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.tag }}" \
            cage-powershell-runtime-smoke 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            summary="$(grep -E '^\[cage-pwsh-smoke\]|^\[cage-pwsh-(direct|cmd|reg|msi|wineboot|winecfg|process|prefix)|^::(error|warning)' "$LOG" | tail -80 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -80 "$LOG" || true)"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::warning title=Candidate PowerShell smoke failed::provider=${{ matrix.provider }} version=${{ matrix.version }} exit=$rc%0A${summary}"
          else
            echo "::notice title=Candidate PowerShell smoke passed::provider=${{ matrix.provider }} version=${{ matrix.version }}"
          fi
          exit 0
