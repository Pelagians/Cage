# workflow to build and push Cage runtime container images to ghcr.io
name: Build Cage Runtime Containers

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - 'runtime/catalog.json'
      - 'runtime/catalog.py'
      - 'runtime/providers.py'
      - 'container/manager.py'
      - '.github/workflows/containers.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/pelagians

jobs:
  catalog:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.catalog.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate build matrix from runtime catalog
        id: catalog
        run: |
          MATRIX="$(python3 -m runtime.catalog --ci-matrix)"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Runtime catalog matrix:"
          echo "${MATRIX}" | python3 -m json.tool

  build:
    runs-on: ubuntu-latest
    needs: catalog
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.catalog.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.provider }}:${{ matrix.version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.published_ref }}
            ${{ matrix.published_alias_refs }}
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.tag }}
          build-args: |
            ${{ matrix.build_arg }}
