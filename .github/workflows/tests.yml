name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'container/runtimes/umu-proton-ge/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'container/runtimes/umu-proton-ge/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tee /tmp/cage-pytest.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: /tmp/cage-pytest.log

  powershell-proton-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    continue-on-error: true
    env:
      TEST_IMAGE: cage-umu-proton-ge:pr-test
    steps:
      - uses: actions/checkout@v4

      - name: Build branch GE-Proton runtime
        run: |
          docker build \
            --build-arg GE_PROTON_TAG=GE-Proton11-1 \
            -t "$TEST_IMAGE" \
            -f container/runtimes/umu-proton-ge/Dockerfile .

      - name: Probe PowerShell through UMU and GE-Proton
        shell: bash
        run: |
          set +e
          evidence=/tmp/powershell-proton
          mkdir -p "$evidence"
          docker run --rm --pull never --shm-size 2g \
            -e POWERSHELL_VERSION=7.4.11 \
            -v "$PWD/tests/scripts:/probe:ro" \
            -v "$evidence:/out" \
            "$TEST_IMAGE" \
            bash /probe/powershell-proton-probe.sh
          rc=$?
          set -e
          printf '%s\n' "$rc" > "$evidence/container.rc"
          find "$evidence" -maxdepth 1 -type f -print -exec sh -c 'echo "--- $1"; tail -180 "$1"' _ {} \;
          exit "$rc"

      - name: Upload Proton evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-proton-${{ github.sha }}
          if-no-files-found: error
          retention-days: 1
          path: /tmp/powershell-proton/**
