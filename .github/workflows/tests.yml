name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tee /tmp/cage-pytest.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: /tmp/cage-pytest.log

  cfw-expand-source-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Measure Windows AIK WinPE payload
        shell: bash
        run: bash tests/scripts/aik-winpe-range-diagnostic.sh

      - name: Upload AIK range report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aik-winpe-range-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 1
          path: /tmp/aik-expand/report.txt
