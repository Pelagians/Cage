name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tee /tmp/cage-pytest.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: /tmp/cage-pytest.log

  cfw-expand-source-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Extract pinned CFW expand bootstrap
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 \
            -o /tmp/winetricks.ps1 \
            https://raw.githubusercontent.com/PietJankbal/Chocolatey-for-wine/f8c5339c6fd9f2c37ca0b6621b9c51884b7bae7d/winetricks.ps1
          python3 - /tmp/winetricks.ps1 <<'PY'
          import re
          import sys
          from pathlib import Path

          lines = Path(sys.argv[1]).read_text(encoding='utf-8-sig').splitlines()

          def function_block(name: str):
              start = next(
                  i for i, line in enumerate(lines)
                  if re.match(rf'\s*function\s+{re.escape(name)}\b', line, re.I)
              )
              depth = 0
              opened = False
              for i in range(start, len(lines)):
                  cleaned = re.sub(r'<#.*?#>', '', lines[i])
                  opens = cleaned.count('{')
                  closes = cleaned.count('}')
                  if opens:
                      opened = True
                  depth += opens - closes
                  if opened and depth <= 0 and i > start:
                      return start, i + 1
              raise RuntimeError(f'unclosed function {name}')

          for target in ('func_expand', 'func_msdelta'):
              start, end = function_block(target)
              print(f'=== {target} lines {start + 1}-{end} ===')
              for index in range(start, end):
                  print(f'{index + 1:04d}: {lines[index]}')
          PY
