name: Chocolatey Lifecycle Smoke

on:
  push:
    branches: [main]
    paths:
      - 'artifact/**'
      - 'builder/**'
      - 'cage/**'
      - 'core/chocolatey/**'
      - 'core/modules/**'
      - 'runtime/**'
      - 'tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml'
      - 'tests/fixtures/chocolatey-feed/**'
      - 'tests/test_chocolatey_*.py'
      - 'pyproject.toml'
      - '.github/workflows/chocolatey-smoke.yml'
  pull_request:
    paths:
      - 'artifact/**'
      - 'builder/**'
      - 'cage/**'
      - 'core/chocolatey/**'
      - 'core/modules/**'
      - 'runtime/**'
      - 'tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml'
      - 'tests/fixtures/chocolatey-feed/**'
      - 'tests/test_chocolatey_*.py'
      - 'pyproject.toml'
      - '.github/workflows/chocolatey-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CAGE_RUNTIME_IMAGE: ghcr.io/pelagians/cage-wine:11.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Cage
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check for released CFW runtime
        id: runtime
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from core.modules.chocolatey import DEFAULT_CFW_RUNTIME_ARTIFACT
          print(f"available={'true' if DEFAULT_CFW_RUNTIME_ARTIFACT else 'false'}")
          PY

      - name: Explain deferred consumer lifecycle
        if: steps.runtime.outputs.available != 'true'
        run: |
          echo 'A CFW prepared-prefix runtime has not been released and pinned yet.'
          echo 'The CFW repository owns runtime construction and proof.'
          echo 'This consumer lifecycle will activate automatically after the immutable archive and evidence digests are pinned.'

      - name: Log in to GitHub Container Registry
        if: steps.runtime.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Wine runtime
        if: steps.runtime.outputs.available == 'true'
        run: docker pull "$CAGE_RUNTIME_IMAGE"

      - name: Run local Chocolatey package lifecycle
        if: steps.runtime.outputs.available == 'true'
        id: smoke
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/cage-module-cache dist
          cage build tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml \
            --output dist \
            --engine docker \
            --image-tag "$CAGE_RUNTIME_IMAGE" \
            --module-cache-dir /tmp/cage-module-cache \
            --build-timeout 7200 2>&1 | tee /tmp/cage-chocolatey-smoke.log
          rc=${PIPESTATUS[0]}
          set -e
          bundle="$(find dist -mindepth 1 -maxdepth 1 -type d ! -name .cage -print -quit)"
          if [ -n "$bundle" ]; then
            find "$bundle" -type f -printf '%P bytes=%s\n' | sort > /tmp/cage-lifecycle-files.txt || true
          else
            : > /tmp/cage-lifecycle-files.txt
          fi
          if [ "$rc" -ne 0 ]; then
            {
              echo '--- CFW runtime evidence ---'
              cat "$bundle/metadata/cfw-runtime.json" 2>/dev/null || echo 'runtime evidence unavailable'
              echo '--- Chocolatey readiness ---'
              cat "$bundle/metadata/chocolatey-diagnostic.json" 2>/dev/null || echo 'readiness evidence unavailable'
              echo '--- Chocolatey feature policy ---'
              cat "$bundle/metadata/chocolatey-feature-policy.json" 2>/dev/null || echo 'feature evidence unavailable'
              echo '--- Chocolatey lifecycle ---'
              cat "$bundle/metadata/chocolatey-smoke.json" 2>/dev/null || echo 'lifecycle evidence unavailable'
              echo '--- build tail ---'
              tail -120 /tmp/cage-chocolatey-smoke.log || true
            } > /tmp/cage-chocolatey-summary.log
            summary="$(tail -300 /tmp/cage-chocolatey-summary.log)"
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Chocolatey lifecycle smoke failed::exit=$rc%0A${summary}"
          else
            echo "::notice title=Chocolatey lifecycle smoke passed::image=$CAGE_RUNTIME_IMAGE"
          fi
          exit "$rc"

      - name: Upload lifecycle evidence
        if: always() && steps.runtime.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-lifecycle-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            dist
            /tmp/cage-chocolatey-smoke.log
            /tmp/cage-chocolatey-summary.log
            /tmp/cage-lifecycle-files.txt
