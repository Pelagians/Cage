name: Chocolatey Lifecycle Smoke

on:
  push:
    branches: [main]
    paths:
      - 'artifact/**'
      - 'builder/**'
      - 'cage/**'
      - 'core/chocolatey/**'
      - 'core/modules/**'
      - 'runtime/**'
      - 'tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml'
      - 'tests/fixtures/chocolatey-feed/**'
      - 'tests/test_chocolatey_*.py'
      - 'pyproject.toml'
      - '.github/workflows/chocolatey-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CAGE_RUNTIME_IMAGE: ghcr.io/pelagians/cage-wine:11.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Cage
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Wine runtime
        run: docker pull "$CAGE_RUNTIME_IMAGE"

      - name: Run local Chocolatey package lifecycle
        id: smoke
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/cage-module-cache dist
          cage build tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml \
            --output dist \
            --engine docker \
            --image-tag "$CAGE_RUNTIME_IMAGE" \
            --module-cache-dir /tmp/cage-module-cache \
            --build-timeout 7200 2>&1 | tee /tmp/cage-chocolatey-smoke.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            summary="$(tail -100 /tmp/cage-chocolatey-smoke.log || true)"
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Chocolatey lifecycle smoke failed::exit=$rc%0A${summary}"
          else
            echo "::notice title=Chocolatey lifecycle smoke passed::image=$CAGE_RUNTIME_IMAGE"
          fi
          exit "$rc"

      - name: Upload lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-lifecycle-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            dist/**/metadata/*.json
            dist/**/logs/**
            dist/**/build/run.sh
            /tmp/cage-chocolatey-smoke.log
