name: Chocolatey Lifecycle Smoke

on:
  push:
    branches: [main]
    paths:
      - 'artifact/**'
      - 'builder/**'
      - 'cage/**'
      - 'core/chocolatey/**'
      - 'core/modules/**'
      - 'runtime/**'
      - 'tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml'
      - 'tests/fixtures/chocolatey-feed/**'
      - 'tests/test_chocolatey_*.py'
      - 'pyproject.toml'
      - '.github/workflows/chocolatey-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CAGE_RUNTIME_IMAGE: ghcr.io/pelagians/cage-wine:11.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Cage
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Wine runtime
        run: docker pull "$CAGE_RUNTIME_IMAGE"

      - name: Run local Chocolatey package lifecycle
        id: smoke
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/cage-module-cache dist
          cage build tests/fixtures/chocolatey-bootstrap-smoke.cage.yaml \
            --output dist \
            --engine docker \
            --image-tag "$CAGE_RUNTIME_IMAGE" \
            --module-cache-dir /tmp/cage-module-cache \
            --build-timeout 7200 2>&1 | tee /tmp/cage-chocolatey-smoke.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            bundle="$(find dist -mindepth 1 -maxdepth 1 -type d ! -name .cage -print -quit)"
            diagnostic="$bundle/metadata/chocolatey-diagnostic.json"
            bootstrap_metadata="$bundle/metadata/chocolatey-upstream-bootstrap.json"
            installer_log="$bundle/logs/chocolatey-upstream/installer.log"
            pwsh_direct_log="$bundle/logs/chocolatey-upstream/pwsh-direct-probe.log"
            path_inventory="$bundle/logs/chocolatey-upstream/chocolatey-path-inventory.log"
            {
              echo '--- Chocolatey-for-Wine stages ---'
              if [ -f "$installer_log" ]; then
                grep -a '^\[cfw\] stage=' "$installer_log" || true
              else
                grep -a '^\[cfw\] stage=' /tmp/cage-chocolatey-smoke.log || true
              fi
              echo '--- bootstrap result ---'
              if [ -f "$bootstrap_metadata" ]; then
                python3 -c 'import json,sys; from pathlib import Path; p=json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")); print(json.dumps({"status":p.get("status"),"returnCodes":p.get("returnCodes", {}),"checks":p.get("checks", {}),"offline":p.get("offline")}, sort_keys=True))' "$bootstrap_metadata"
              else
                echo 'bootstrap metadata unavailable'
              fi
              echo '--- Chocolatey path inventory ---'
              if [ -f "$path_inventory" ]; then
                cat "$path_inventory"
              else
                echo 'path inventory unavailable'
              fi
              echo '--- chocolatey diagnostic ---'
              if [ -f "$diagnostic" ]; then
                python3 -c 'import json,sys; from pathlib import Path; p=json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")); s=p.get("fileSizes", {}); f=p.get("tiers", {}).get("failureOnly", {}); print(json.dumps({"status":p.get("status"),"failedChecks":p.get("failedChecks", []),"returnCodes":p.get("returnCodes", {}),"failureTrigger":f.get("failureTrigger"),"criticalFileSizes":{n:s.get(n) for n in ("canonicalChoco","nativeMscoree","appLocalMscoree","nativeClr","appLocalClr")}}, sort_keys=True))' "$diagnostic"
              else
                echo 'diagnostic unavailable'
              fi
              echo '--- focused Chocolatey errors ---'
              for log in \
                "$bundle/logs/chocolatey-diagnostics/choco-version.log" \
                "$bundle/logs/chocolatey-diagnostics/choco-version-cmd.log" \
                "$bundle/logs/chocolatey-diagnostics/choco-mscoree-loader.log" \
                "$bundle/logs/chocolatey-diagnostics/choco-version-winedebug.log"; do
                if [ -f "$log" ]; then
                  echo "[$log]"
                  grep -Eai '(^|:)(err|fatal):|error|exception|failed|missing|cannot|status c[0-9a-f]+' "$log" | tail -25 || true
                fi
              done
              echo '--- loader tail ---'
              tail -25 "$bundle/logs/chocolatey-diagnostics/choco-mscoree-loader.log" 2>/dev/null || true
              echo '--- live Chocolatey process tree ---'
              tail -80 "$bundle/logs/chocolatey-diagnostics/choco-live-process-tree.log" 2>/dev/null || true
              echo '--- process tree ---'
              tail -80 "$bundle/logs/chocolatey-diagnostics/process-tree.log" 2>/dev/null || true
              echo '--- build tail ---'
              tail -30 /tmp/cage-chocolatey-smoke.log || true
              echo '--- installer non-stage tail ---'
              if [ -f "$installer_log" ]; then
                grep -av '^\[cfw\] stage=' "$installer_log" | tail -40 || true
                echo '--- focused finalizer output ---'
                grep -Eai 'finalizer-script-entry|pwsh|powershell|choc_install|not recognized|parameter|cannot find|error' "$installer_log" | tail -60 || true
              else
                echo 'installer log unavailable'
              fi
              echo '--- direct pwsh probe ---'
              if [ -f "$pwsh_direct_log" ]; then
                tr -d '\r' < "$pwsh_direct_log" | grep -a '^\[cfw\] stage=direct-pwsh-alive$' || echo 'direct pwsh marker absent'
              else
                echo 'direct pwsh probe unavailable'
              fi
            } > /tmp/cage-chocolatey-summary.log
            summary="$(tail -160 /tmp/cage-chocolatey-summary.log)"
            if [ -f "$path_inventory" ]; then
              summary="${summary}"$'\n--- Chocolatey path inventory ---\n'"$(cat "$path_inventory")"
            else
              summary="${summary}"$'\n--- Chocolatey path inventory ---\npath inventory unavailable'
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Chocolatey lifecycle smoke failed::exit=$rc%0A${summary}"
          else
            echo "::notice title=Chocolatey lifecycle smoke passed::image=$CAGE_RUNTIME_IMAGE"
          fi
          exit "$rc"

      - name: Upload lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-lifecycle-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            dist/**/metadata/*.json
            dist/**/logs/**
            dist/**/build/run.sh
            /tmp/cage-chocolatey-smoke.log
