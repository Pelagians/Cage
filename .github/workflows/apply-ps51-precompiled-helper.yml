name: Apply PS5.1 Precompiled Helper

on:
  push:
    branches: [agent/synchro-cfw-layering]
    paths:
      - '.github/workflows/apply-ps51-precompiled-helper.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synchro-cfw-layering
          fetch-depth: 0

      - name: Compile deterministic helper asset
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y mono-mcs
          cp scripts/assembly-inventory.cs core/chocolatey/assets/assembly-inventory.cs
          mcs -sdk:4 -optimize+ -debug- -target:exe \
            -out:core/chocolatey/assets/assembly-inventory.exe \
            core/chocolatey/assets/assembly-inventory.cs
          chmod 0644 core/chocolatey/assets/assembly-inventory.exe
          test "$(xxd -p -l 2 core/chocolatey/assets/assembly-inventory.exe)" = 4d5a
          sha256sum core/chocolatey/assets/assembly-inventory.exe

          mkdir -p /tmp/cage-assembly-helper-test
          printf 'public sealed class SampleAssembly {}\n' > /tmp/SampleAssembly.cs
          mcs -sdk:4 -target:library \
            -out:/tmp/cage-assembly-helper-test/SampleAssembly.dll \
            /tmp/SampleAssembly.cs
          mono core/chocolatey/assets/assembly-inventory.exe \
            /tmp/cage-assembly-helper-test /tmp/cage-assembly-helper.tsv
          grep -q $'^SampleAssembly.dll\tSampleAssembly\t' /tmp/cage-assembly-helper.tsv

      - name: Integrate helper asset
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply-ps51-precompiled-helper.py
          bash -n core/chocolatey/assets/install-powershell51.sh
          python -m py_compile core/modules/powershell_engine.py
          git diff --check

      - name: Commit helper asset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            core/chocolatey/assets/assembly-inventory.cs \
            core/chocolatey/assets/assembly-inventory.exe \
            core/chocolatey/assets/install-powershell51.sh \
            core/modules/powershell_engine.py \
            pyproject.toml
          git commit -m 'fix: package PS5.1 assembly metadata helper'
          git push origin HEAD:agent/synchro-cfw-layering
