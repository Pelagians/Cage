name: Apply PS5.1 GAC Fix

on:
  push:
    branches: [agent/synchro-cfw-layering]
    paths:
      - '.github/workflows/apply-ps51-gac-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synchro-cfw-layering
          fetch-depth: 0

      - name: Patch PowerShell 5.1 materializer
        run: |
          python scripts/apply-ps51-gac-fix.py
          bash -n core/chocolatey/assets/install-powershell51.sh

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add core/chocolatey/assets/install-powershell51.sh
          git diff --cached --check
          git commit -m 'fix: install PS5.1 assemblies into the .NET GAC'
          git push origin HEAD:agent/synchro-cfw-layering
