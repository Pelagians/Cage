# Cage Docker Compose — local development and testing
#
# Build a specific provider image, then run the builder or a shell inside it.
# Examples:
#   docker compose build wine
#   docker compose run wine bash
#   docker compose run --rm wine cage build /workspace/manifest.json

services:
  wine:
    build:
      context: ..
      dockerfile: container/providers/wine/Dockerfile
      args:
        WINE_PACKAGE_VERSION: "11.0.0.0~bookworm-1"
    image: cage/wine:11.0-dev
    environment:
      WINEFS: builder
    volumes:
      - ..:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

  wine-staging:
    build:
      context: ..
      dockerfile: container/providers/wine-staging/Dockerfile
      args:
        WINE_PACKAGE_VERSION: "11.10~bookworm-1"
    image: cage/wine-staging:11.10-dev
    environment:
      WINEFS: builder
    volumes:
      - ..:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

  umu-proton-ge:
    build:
      context: ..
      dockerfile: container/providers/umu-proton-ge/Dockerfile
      args:
        GE_PROTON_TAG: "GE-Proton11-1"
    image: cage/umu-proton-ge:GE-Proton11-1-dev
    environment:
      WINEFS: builder
    volumes:
      - ..:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
