# Intentionally invalid sandbox recipe: powershell-wrapper and chocolatey both
# replace the Wine PowerShell surface today. Keep this as a reminder/fixture for
# the future compatibility work; validation should reject it until the two
# compatibility layers are reconciled.
schemaVersion: cage.app/v0
name: test-pwsh-choco-hybrid
version: 1.0.0

runtime:
  provider: wine
  version: "9.0"

modules:
  - type: powershell-wrapper
    version: "7"

  - type: chocolatey
    install:
      packages:
        - 7zip
        - notepadplusplus
