# Test recipe: PowerShell wrapper + Chocolatey-for-wine hybrid approach
# This validates that both projects work together correctly
schemaVersion: cage.app/v0
name: test-pwsh-choco-hybrid
version: 1.0.0

runtime:
  provider: wine
  version: "9.0"

modules:
  # First: Install PowerShell wrapper for wine
  - type: powershell
    version: "7"
  
  # Second: Install Chocolatey-for-wine (depends on PowerShell wrapper)
  # This will check if PowerShell wrapper is installed, install if missing,
  # then install Chocolatey-for-wine, then install packages
  - type: chocolatey
    install:
      packages:
        - 7zip
        - notepadplusplus
