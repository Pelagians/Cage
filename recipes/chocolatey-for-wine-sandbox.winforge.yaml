schemaVersion: winforge.app/v0
name: chocolatey-for-wine-sandbox
version: "0.1.0"

runtime:
  provider: wine
  version: latest
  # This sandbox is for interactive VNC choco/package experiments.
  # Keep bridge networking here; production app artifacts should normally use none.
  network: bridge

sources:
  - id: chocolatey-for-wine
    type: archive
    policy: redistributable
    url: https://github.com/PietJankbal/Chocolatey-for-wine/releases/download/v0.5c.755/Chocolatey-for-wine.7z
    sha256: 87f4ecc08a9b22f16aa5633ca107c151ddf3fed0b256fed9fb99680af7095d14
    description: PietJankbal Chocolatey-for-wine prebuilt installer bundle.

install:
  - kind: script
    command: set -eu; url='https://github.com/PietJankbal/Chocolatey-for-wine/releases/download/v0.5c.755/Chocolatey-for-wine.7z'; sha='87f4ecc08a9b22f16aa5633ca107c151ddf3fed0b256fed9fb99680af7095d14'; work='/tmp/chocolatey-for-wine'; archive="$work/Chocolatey-for-wine.7z"; extract="$work/extracted"; tools="$WINEPREFIX/drive_c/ProgramData/tools"; choco_root="$WINEPREFIX/drive_c/ProgramData/chocolatey"; choco_real="$choco_root/choco.exe"; choco="$choco_root/bin/choco.exe"; rm -rf "$work"; mkdir -p "$extract"; echo '=== Downloading Chocolatey-for-wine release ==='; curl -fL "$url" -o "$archive"; echo "$sha  $archive" | sha256sum -c -; echo '=== Extracting Chocolatey-for-wine release ==='; 7z x -y "$archive" "-o$extract"; installer="$(find "$extract" -maxdepth 4 -type f -iname 'ChoCinstaller_*.exe' | sort -V | tail -n 1)"; if [ -z "$installer" ]; then echo 'ERROR: ChoCinstaller_*.exe not found in Chocolatey-for-wine release' >&2; find "$extract" -maxdepth 4 -type f | sort >&2; exit 1; fi; install_dir="$(dirname "$installer")"; echo "=== Running Chocolatey-for-wine installer: $installer ==="; cd "$install_dir"; wine "$(basename "$installer")" /q; echo '=== Waiting for Chocolatey marker from ChoCinstaller ==='; for i in $(seq 1 60); do [ -f "$choco" ] && break; sleep 1; done; if [ ! -f "$choco" ]; then echo '=== Chocolatey-for-wine installer returned without choco.exe; running choc_install.ps1 explicitly ==='; script="$install_dir/choc_install.ps1"; if [ ! -f "$script" ]; then echo 'ERROR: choc_install.ps1 not found next to ChoCinstaller' >&2; find "$install_dir" -maxdepth 2 -type f | sort >&2; exit 1; fi; payload="$(find "$tools" -maxdepth 1 -type d -iname chocolateyInstall 2>/dev/null | sort | head -n 1 || true)"; if [ -n "$payload" ] && [ "$payload" != "$tools/ChocolateyInstall" ]; then echo "=== Normalizing ChocolateyInstall payload path: $payload ==="; rm -rf "$tools/ChocolateyInstall"; mv "$payload" "$tools/ChocolateyInstall"; fi; pwsh=''; for i in $(seq 1 120); do pwsh="$(find "$WINEPREFIX/drive_c" -maxdepth 7 -type f -iname pwsh.exe 2>/dev/null | sort | head -n 1 || true)"; [ -n "$pwsh" ] && break; sleep 1; done; if [ -z "$pwsh" ]; then echo 'ERROR: pwsh.exe not found after ChoCinstaller' >&2; find "$WINEPREFIX/drive_c" -maxdepth 7 -type f -iname '*powershell*' -o -iname 'pwsh.exe' 2>/dev/null | sort >&2; exit 1; fi; echo "=== Running fallback with pwsh: $pwsh ==="; wine "$pwsh" -f "$(winepath -w "$script")" "$(winepath -w "$install_dir")" /q || echo '=== WARNING: choc_install.ps1 returned non-zero; trying minimal Chocolatey payload fallback if needed ==='; fi; if [ ! -f "$choco" ]; then echo '=== choc_install.ps1 did not create choco.exe; applying minimal Chocolatey payload fallback ==='; payload="$(find "$tools" -maxdepth 1 -type d -iname chocolateyInstall 2>/dev/null | sort | head -n 1 || true)"; if [ -z "$payload" ]; then echo 'ERROR: Chocolatey payload directory not found under ProgramData/tools' >&2; find "$WINEPREFIX/drive_c/ProgramData" -maxdepth 4 \( -type d -o -type f \) 2>/dev/null | sort >&2; exit 1; fi; rm -rf "$choco_root"; mkdir -p "$choco_root"; cp -a "$payload/." "$choco_root/"; mkdir -p "$choco_root/bin"; test -f "$choco_root/redirects/choco.exe"; cp "$choco_root/redirects/choco.exe" "$choco"; fi; echo '=== Verifying Chocolatey-for-wine install markers ==='; test -f "$choco"; test -f "$choco_real"; test -f "$WINEPREFIX/drive_c/windows/system32/WindowsPowerShell/v1.0/powershell.exe"; echo '=== Registering ChocolateyInstall environment ==='; export ChocolateyInstall='C:\ProgramData\chocolatey'; wine reg add 'HKLM\System\CurrentControlSet\Control\Session Manager\Environment' /v ChocolateyInstall /t REG_SZ /d 'C:\ProgramData\chocolatey' /f; echo '=== Verifying Chocolatey root choco.exe --version ==='; wine "$choco_real" --version; echo '=== Verifying Chocolatey bin/choco.exe launcher ==='; if ! wine "$choco" --version; then echo '=== bin/choco.exe launcher failed; replacing shim with root choco.exe ==='; cp "$choco_real" "$choco"; wine "$choco" --version; fi; echo '=== Applying Chocolatey-for-wine Chocolatey feature defaults ==='; wine "$choco" feature disable --name=powershellHost; wine "$choco" feature enable -n allowGlobalConfirmation
compatibility:
  arch: win64
  windowsVersion: win10
  graphics:
    backend: wined3d
  env:
    WINEDEBUG: "-all"

# Chocolatey-for-wine makes wine powershell.exe start the PowerShell Core-backed
# wrapper environment. Use wineconsole for visible VNC/noVNC interaction.
launch:
  entrypoint: C:/windows/system32/wineconsole.exe
  args:
    - "C:/windows/system32/WindowsPowerShell/v1.0/powershell.exe"
    - -NoLogo
    - -NoExit
  env:
    NO_COLOR: "1"
    POWERSHELL_UPDATECHECK: Off
    ChocolateyInstall: C:\ProgramData\chocolatey
  workingDirectory: C:/

entrypoints:
  - id: chocolatey-powershell
    name: Chocolatey-for-wine PowerShell console
    executable: C:/windows/system32/wineconsole.exe
    args:
      - "C:/windows/system32/WindowsPowerShell/v1.0/powershell.exe"
      - -NoLogo
      - -NoExit
    env:
      NO_COLOR: "1"
      POWERSHELL_UPDATECHECK: Off
      ChocolateyInstall: C:\ProgramData\chocolatey
    workingDirectory: C:/
  - id: cmd
    name: Command Prompt fallback
    executable: C:/windows/system32/cmd.exe
    args:
      - /k
      - set PATH=C:\ProgramData\chocolatey\bin;%PATH%
    workingDirectory: C:/

state:
  persistence: persistent

exports:
  - name: chocolatey-for-wine-tools
    path: C:/ProgramData/Chocolatey-for-wine
  - name: chocolatey-install
    path: C:/ProgramData/chocolatey

provenance:
  sources:
    - uri: https://github.com/PietJankbal/Chocolatey-for-wine/releases/download/v0.5c.755/Chocolatey-for-wine.7z
      sha256: 87f4ecc08a9b22f16aa5633ca107c151ddf3fed0b256fed9fb99680af7095d14
      note: Prebuilt Chocolatey-for-wine release asset; installer is run with /q for install-only/no auto-launch.
