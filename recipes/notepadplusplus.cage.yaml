schemaVersion: cage.app/v0
name: notepadplusplus
version: "0.1.0"

runtime:
  provider: wine
  version: latest
  network: none

build:
  network: bridge

modules:
  - type: chocolatey
    install:
      packages:
        - notepadplusplus

compatibility:
  arch: win64
  windowsVersion: win10
  graphics:
    backend: wined3d

launch:
  entrypoint: C:/Program Files/Notepad++/notepad++.exe
